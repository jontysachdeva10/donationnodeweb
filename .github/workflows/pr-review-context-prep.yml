name: PR Review Playbook Context Preparer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  prepare-context:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          sudo mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            sudo dd of=/etc/apt/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] \
            https://cli.github.com/packages stable main" | \
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Extract PR metadata
        id: meta
        run: |
          echo "PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q '.title')" >> $GITHUB_OUTPUT
          echo "PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body')" >> $GITHUB_OUTPUT

      - name: Extract PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Extract changed files
        run: gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path' > changed_files.txt

      - name: Prepare Context Bundle
        run: |
          {
            echo "### 🤖 Bob PR Review Playbook — Context Bundle"
            echo ""
            echo "**PR Title:**"
            echo "${{ steps.meta.outputs.PR_TITLE }}"
            echo ""
            echo "**PR Description:**"
            echo "${{ steps.meta.outputs.PR_BODY }}"
            echo ""
            echo "**Changed Files:**"
            cat changed_files.txt | sed 's/^/- /'
            echo ""
            echo "**Diff:**"
            echo "\`\`\`diff"
            cat pr.diff
            echo "\`\`\`"
            echo ""
            echo "### 📘 How to Run in Bob"
            echo "Copy/paste this entire content into Bob with:"
            echo "> Review this PR using the Playbook at bob/pr_review_playbook.yaml"
          } > context.md

      - name: Post Context Bundle to PR
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file context.md
