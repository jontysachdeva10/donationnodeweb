---
name: PR Review Playbook (BobShell Automated)
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  bob-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Installation steps - only run on PR opened or reopened
      - name: Setup Node.js
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install GitHub CLI
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          sudo mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            sudo dd of=/etc/apt/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
      
      - name: Install BobShell
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        run: |
          curl -s https://s3.us-south.cloud-object-storage.appdomain.cloud/bobshell/install-bobshell.sh | bash -s -- --pm npm
          echo "BobShell installed."
      
      # Review steps - run on all PR events
      - name: Extract PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          echo "PR_TITLE=$TITLE" >> $GITHUB_OUTPUT
          echo "PR_BODY=$BODY" >> $GITHUB_OUTPUT
      
      - name: Extract PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
      
      - name: Extract changed files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path' > changed_files.txt
      
      - name: Export BobShell API Key
        run: |
          export BOBSHELL_API_KEY="sk-vXQ-uRFhlKoQM7dVgqq74w"
          echo "BOBSHELL_API_KEY exported."
      
      - name: Run BobShell Review
        run: |
          export BOBSHELL_API_KEY="sk-vXQ-uRFhlKoQM7dVgqq74w"

          PROMPT="You are running PR Review Playbook.

          PR Title:
          ${{ steps.meta.outputs.PR_TITLE }}

          PR Description:
          ${{ steps.meta.outputs.PR_BODY }}

          Changed Files:
          $(sed 's/^/- /' changed_files.txt)

          Diff:
          $(cat pr.diff)

          Use rules from bob/pr_review_playbook.yaml.
          Run ALL passes:
          - Intent
          - Security
          - Correctness
          - API compatibility
          - Test adequacy
          - Performance
          - Documentation

          Produce a structured review with THREE sections:

          SECTION 1 - Summary (for PR comment):
          - Intent Summary
          - Issue Grouping (Critical, High, Medium, Low)
          - Security Findings
          - Breaking Changes
          - Required Tests
          - Final Verdict
          - Fix Suggestions

          SECTION 2 - Inline Comments with Suggested Fixes:
          After your summary, add a section titled '## Inline Review Comments'
          For EACH specific issue you find in the code, provide a comment in this EXACT format:
          INLINE|filepath|line_number|severity|Issue description

          SUGGESTED_FIX|filepath|line_number
          ```language
          // Suggested code fix here
          ```

          Example:
          INLINE|src/app.js|42|High|This function has a potential SQL injection vulnerability. Use parameterized queries instead.

          SUGGESTED_FIX|src/app.js|42
          ```javascript
          const query = 'SELECT * FROM users WHERE id = ?';
          db.query(query, [userId], (err, results) => {
            // handle results
          });
          ```

          INLINE|src/utils.js|15|Medium|Consider using const instead of let for immutable variables

          SUGGESTED_FIX|src/utils.js|15
          ```javascript
          const maxRetries = 3;
          ```

          Make sure to:
          - Include the actual file paths from the changed files list
          - Provide specific line numbers where issues occur
          - Include a code block with the suggested fix using proper syntax highlighting
          - Show enough context in the fix so it's clear what needs to be changed

          SECTION 3 - Copy-Paste Fix Prompt:
          At the end, create a section titled '## 🔧 Ready-to-Use Fix Prompt'
          Generate a comprehensive, copy-paste ready prompt that users can directly use in Bob IDE to fix all the issues found.
          
          Format it as a code block with clear instructions:
          \`\`\`
          Please fix the following issues found in the PR review:

          [List each issue with:
          - File path and line number
          - Issue description
          - Suggested fix approach
          - Any relevant context]

          Changed files to review:
          [List the changed files]

          Please apply these fixes while maintaining:
          - Code style consistency
          - Existing functionality
          - Test coverage
          - Documentation updates if needed
          \`\`\`
          
          Make this prompt detailed and actionable so the user can copy it directly into Bob IDE without modifications."

          bob --chat-mode=advanced -p "$PROMPT" > bob_review_output.md
      
      - name: Extract Summary Section
        run: |
          # Extract only the summary section (before inline comments section)
          sed '/## Inline Review Comments/,$d' bob_review_output.md > bob_summary.md
          
          # If no inline comments section found, use the whole output
          if [ ! -s bob_summary.md ]; then
            cp bob_review_output.md bob_summary.md
          fi
      
      - name: Post Summary to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file bob_summary.md
      
      - name: Debug - Show Bob Output
        run: |
          echo "=== Full Bob Output ==="
          cat bob_review_output.md
          echo "=== End Bob Output ==="
      
      - name: Post Inline Review Comments with Suggested Fixes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the commit SHA
          COMMIT_SHA=$(gh pr view ${{ github.event.pull_request.number }} --json headRefOid -q .headRefOid)
          
          # Create a temporary file to store processed comments
          > inline_comments_processed.txt
          
          # Read the entire output and process it
          in_code_block=false
          current_fix=""
          current_filepath=""
          current_line=""
          
          while IFS= read -r line; do
            # Check if this is an INLINE comment
            if [[ "$line" =~ ^INLINE\|(.+)\|([0-9]+)\|(.+)\|(.+)$ ]]; then
              filepath="${BASH_REMATCH[1]}"
              line_num="${BASH_REMATCH[2]}"
              severity="${BASH_REMATCH[3]}"
              comment="${BASH_REMATCH[4]}"
              
              echo "INLINE|$filepath|$line_num|$severity|$comment" >> inline_comments_processed.txt
              current_filepath="$filepath"
              current_line="$line_num"
              
            # Check if this is a SUGGESTED_FIX marker
            elif [[ "$line" =~ ^SUGGESTED_FIX\|(.+)\|([0-9]+)$ ]]; then
              current_fix=""
              in_code_block=false
              
            # Check if we're entering a code block
            elif [[ "$line" =~ ^\`\`\` ]] && [[ -z "$current_fix" ]]; then
              in_code_block=true
              current_fix="$line"$'\n'
              
            # Check if we're exiting a code block
            elif [[ "$line" =~ ^\`\`\`$ ]] && [[ -n "$current_fix" ]]; then
              current_fix+="$line"
              echo "FIX|$current_filepath|$current_line|$current_fix" >> inline_comments_processed.txt
              in_code_block=false
              current_fix=""
              
            # Collect code block content
            elif [[ "$in_code_block" == true ]]; then
              current_fix+="$line"$'\n'
            fi
          done < bob_review_output.md
          
          # Now post the comments with their fixes
          current_comment=""
          current_fix=""
          
          while IFS='|' read -r type filepath line_num severity_or_fix rest; do
            if [[ "$type" == "INLINE" ]]; then
              # If we have a previous comment with fix, post it
              if [[ -n "$current_comment" ]]; then
                BODY="$current_comment"
                if [[ -n "$current_fix" ]]; then
                  BODY="$BODY"$'\n\n'"### 💡 Suggested Fix:"$'\n'"$current_fix"
                fi
                
                echo "Posting comment to $prev_filepath:$prev_line"
                gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                  -f body="$BODY" \
                  -f commit_id="$COMMIT_SHA" \
                  -f path="$prev_filepath" \
                  -F line="$prev_line" \
                  || echo "⚠️ Failed to post comment for $prev_filepath:$prev_line"
              fi
              
              # Start new comment
              current_comment="**[$severity_or_fix]** $rest"
              current_fix=""
              prev_filepath="$filepath"
              prev_line="$line_num"
              
            elif [[ "$type" == "FIX" ]]; then
              # Store the fix for the current comment
              current_fix="$severity_or_fix"
            fi
          done < inline_comments_processed.txt
          
          # Post the last comment if exists
          if [[ -n "$current_comment" ]]; then
            BODY="$current_comment"
            if [[ -n "$current_fix" ]]; then
              BODY="$BODY"$'\n\n'"### 💡 Suggested Fix:"$'\n'"$current_fix"
            fi
            
            echo "Posting comment to $prev_filepath:$prev_line"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              -f body="$BODY" \
              -f commit_id="$COMMIT_SHA" \
              -f path="$prev_filepath" \
              -F line="$prev_line" \
              || echo "⚠️ Failed to post comment for $prev_filepath:$prev_line"
          fi
          
          # Count how many inline comments were found
          INLINE_COUNT=$(grep -c "^INLINE|" inline_comments_processed.txt || echo "0")
          echo "Found $INLINE_COUNT inline comments with suggested fixes to post"
      
      - name: Create Labels if Not Exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Define all possible labels with colors
          declare -A LABEL_COLORS=(
            ["bob-validated"]="0e8a16"
            ["severity-critical"]="d73a4a"
            ["severity-high"]="ff6b6b"
            ["severity-medium"]="fbca04"
            ["severity-low"]="d4c5f9"
            ["fix-needed"]="ff9800"
            ["security-review"]="b60205"
            ["performance-review"]="1d76db"
          )
          
          # Create each label if it doesn't exist
          for label in "${!LABEL_COLORS[@]}"; do
            color="${LABEL_COLORS[$label]}"
            gh label create "$label" --color "$color" --force 2>/dev/null || true
          done
          
          echo "Labels created/verified"
      
      - name: Analyze Review and Apply Labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Initialize labels array
          LABELS="bob-validated"
          
          # Check for critical issues
          if grep -qi "critical" bob_review_output.md; then
            LABELS="$LABELS,severity-critical"
          fi
          
          # Check for high severity issues
          if grep -qi "high" bob_review_output.md && ! echo "$LABELS" | grep -q "severity-critical"; then
            LABELS="$LABELS,severity-high"
          fi
          
          # Check for medium severity issues
          if grep -qi "medium" bob_review_output.md && ! echo "$LABELS" | grep -q "severity-"; then
            LABELS="$LABELS,severity-medium"
          fi
          
          # Check if fixes are suggested
          if grep -qi "fix" bob_review_output.md || grep -qi "suggestion" bob_review_output.md; then
            LABELS="$LABELS,fix-needed"
          fi
          
          # Check for security issues
          if grep -qi "security" bob_review_output.md; then
            LABELS="$LABELS,security-review"
          fi
          
          # Check for performance issues
          if grep -qi "performance" bob_review_output.md; then
            LABELS="$LABELS,performance-review"
          fi
          
          # Apply labels to PR
          echo "Applying labels: $LABELS"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$LABELS"
