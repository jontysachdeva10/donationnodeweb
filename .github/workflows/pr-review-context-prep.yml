---
name: PR Review Playbook (BobShell Automated)
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  bob-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Installation steps - only run on PR opened or reopened
      - name: Setup Node.js
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install GitHub CLI
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          sudo mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
            sudo dd of=/etc/apt/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
            sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
      
      - name: Install BobShell
        if: github.event.action == 'opened' || github.event.action == 'reopened'
        run: |
          curl -s https://s3.us-south.cloud-object-storage.appdomain.cloud/bobshell/install-bobshell.sh | bash -s -- --pm npm
          echo "BobShell installed."
      
      # Review steps - run on all PR events
      - name: Extract PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          echo "PR_TITLE=$TITLE" >> $GITHUB_OUTPUT
          echo "PR_BODY=$BODY" >> $GITHUB_OUTPUT
      
      - name: Extract PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
      
      - name: Extract changed files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path' > changed_files.txt
      
      - name: Export BobShell API Key
        run: |
          export BOBSHELL_API_KEY="sk-vXQ-uRFhlKoQM7dVgqq74w"
          echo "BOBSHELL_API_KEY exported."
      
      - name: Run BobShell Review
        run: |
          export BOBSHELL_API_KEY="sk-vXQ-uRFhlKoQM7dVgqq74w"
          
          # Create prompt using Python to avoid shell issues
          python3 << 'EOF'
          prompt = """You are running PR Review Playbook.

          PR Title: ${{ steps.meta.outputs.PR_TITLE }}
          PR Description: ${{ steps.meta.outputs.PR_BODY }}

          Changed Files:
          CHANGED_FILES_PLACEHOLDER

          Diff:
          DIFF_CONTENT_PLACEHOLDER

          IMPORTANT: Do NOT include any preliminary analysis, thinking process, or "Let me analyze" statements.
          Start DIRECTLY with the structured review output below. No introductory text.

          Use rules from bob/pr_review_playbook.yaml.
          Run ALL passes:
          - Intent
          - Security
          - Correctness
          - API compatibility
          - Test adequacy
          - Performance
          - Documentation

          Produce a structured review with THREE sections (start immediately with Section 1 heading):

          SECTION 1 - Summary (for PR comment):
          IMPORTANT: Do NOT include any INLINE| formatted comments in this section.
          Only provide high-level summaries and descriptions.
          
          Include:
          - Intent Summary (what the PR does)
          - Issue Grouping (Critical, High, Medium, Low) - DESCRIBE the issues with file paths and line numbers
          - Security Findings (summary only)
          - Breaking Changes (if any)
          - Required Tests (if missing)
          - Suggested Code Fixes (a dedicated section with specific code examples showing before/after for major issues)
          - Final Verdict (Approve/Request Changes/Comment)
          
          For the Suggested Code Fixes section, use this format:
          ## Suggested Code Fixes
          
          ### Fix 1: [Issue Title]
          **File**: path/to/file.ts:line
          **Severity**: Critical/High/Medium/Low
          **Issue**: Brief description
          
          **Current Code**:
          (code block with problematic code)
          
          **Suggested Fix**:
          (code block with fixed code)
          
          **Why**: Explanation of why this fix is needed

          SECTION 2 - Inline Comments (INTERNAL USE ONLY - NOT FOR PR COMMENT):
          IMPORTANT: This section will NOT be posted to the PR comment. It's only for generating inline review comments.
          
          For EACH specific issue you find in the code, provide a comment in this EXACT format (one per line):
          INLINE|filepath|line_number|severity|your detailed comment here
          
          Example:
          INLINE|src/app.js|42|High|This function has a potential SQL injection vulnerability
          INLINE|src/utils.js|15|Medium|Consider using const instead of let for immutable variables

          Make sure to include the actual file paths from the changed files list and specific line numbers where issues occur.

          SECTION 3 - Copy-Paste Fix Prompt:
          At the end, create a section titled '## 🔧 Ready-to-Use Fix Prompt'
          Generate a comprehensive, copy-paste ready prompt that users can directly use in Bob IDE to fix all the issues found.
          
          Format it as a code block with clear instructions:
          \`\`\`
          Please fix the following issues found in the PR review:

          [List each issue with:
          - File path and line number
          - Issue description
          - Suggested fix approach
          - Any relevant context]

          Changed files to review:
          [List the changed files]

          Please apply these fixes while maintaining:
          - Code style consistency
          - Existing functionality
          - Test coverage
          - Documentation updates if needed
          \`\`\`
          
          Make this prompt detailed and actionable so the user can copy it directly into Bob IDE without modifications.
          """

          # Read files
          with open('changed_files.txt', 'r') as f:
              changed_files = ''.join('- ' + line for line in f)
          with open('pr.diff', 'r') as f:
              diff = f.read()

          # Replace placeholders
          prompt = prompt.replace('CHANGED_FILES_PLACEHOLDER', changed_files)
          prompt = prompt.replace('DIFF_CONTENT_PLACEHOLDER', diff)

          # Write prompt
          with open('prompt.txt', 'w') as f:
              f.write(prompt)
          EOF

          # Run Bob
          bob --chat-mode=advanced -p "$(cat prompt.txt)" > bob_review_output.md
      
      - name: Extract Summary Section (without Section 2)
        run: |
          python3 << 'PYTHON_SCRIPT'
          with open('bob_review_output.md', 'r') as f:
              content = f.read()
          
          lines = content.split('\n')
          filtered_lines = []
          skip_section = False
          
          for line in lines:
              # Start skipping when we hit Section 2 header
              if '💬 Inline Comments' in line or 'SECTION 2' in line:
                  skip_section = True
                  continue
              
              # Stop skipping when we hit Section 3 header
              if '🔧 Suggested Code Fixes' in line or 'SECTION 3' in line:
                  skip_section = False
              
              # Skip INLINE| formatted lines
              if line.startswith('INLINE|'):
                  continue
              
              # Skip SUGGESTED_FIX| formatted lines
              if line.startswith('SUGGESTED_FIX|'):
                  continue
              
              # Add line if we're not in skip mode
              if not skip_section:
                  filtered_lines.append(line)
          
          # Write filtered content
          with open('bob_summary.md', 'w') as f:
              f.write('\n'.join(filtered_lines))
          
          print(f"Original lines: {len(lines)}")
          print(f"Filtered lines: {len(filtered_lines)}")
          PYTHON_SCRIPT
      
      - name: Post Summary to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file bob_summary.md
      
      - name: Debug - Show Bob Output
        run: |
          echo "=== Full Bob Output ==="
          cat bob_review_output.md
          echo "=== End Bob Output ==="
      
      - name: Post Inline Review Comments with Suggested Fixes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(gh pr view ${{ github.event.pull_request.number }} --json headRefOid -q .headRefOid)
          gh pr diff ${{ github.event.pull_request.number }} --name-only > changed_files_only.txt
          
          python3 << 'PYTHON_SCRIPT'
          import re, subprocess, os
          
          commit_sha = os.environ.get('COMMIT_SHA')
          pr_number = "${{ github.event.pull_request.number }}"
          repo = "${{ github.repository }}"
          
          with open('changed_files_only.txt', 'r') as f:
              changed_files = set(line.strip() for line in f if line.strip())
          
          # Parse the diff to get valid line numbers for each file
          with open('pr.diff', 'r') as f:
              diff_content = f.read()
          
          # Extract valid line numbers from diff
          valid_lines = {}
          current_file = None
          for line in diff_content.split('\n'):
              file_match = re.match(r'^\+\+\+ b/(.+)$', line)
              if file_match:
                  current_file = file_match.group(1)
                  valid_lines[current_file] = set()
                  continue
              
              hunk_match = re.match(r'^@@ -\d+(?:,\d+)? \+(\d+)(?:,(\d+))? @@', line)
              if hunk_match and current_file:
                  start_line = int(hunk_match.group(1))
                  count = int(hunk_match.group(2)) if hunk_match.group(2) else 1
                  for i in range(start_line, start_line + count):
                      valid_lines[current_file].add(i)
          
          print(f"Valid diff lines per file:")
          for file, lines in valid_lines.items():
              print(f"  {file}: {len(lines)} lines")
          
          with open('bob_review_output.md', 'r') as f:
              content = f.read()
          
          lines = content.split('\n')
          comments = []
          current_comment = None
          in_code_block = False
          code_block_lines = []
          
          for line in lines:
              inline_match = re.match(r'^INLINE\|([^|]+)\|(\d+)\|([^|]+)\|(.+)$', line)
              if inline_match:
                  if current_comment:
                      comments.append(current_comment)
                  current_comment = {
                      'filepath': inline_match.group(1),
                      'line': inline_match.group(2),
                      'severity': inline_match.group(3),
                      'comment': inline_match.group(4),
                      'fix': None
                  }
                  continue
              
              fix_match = re.match(r'^SUGGESTED_FIX\|([^|]+)\|(\d+)$', line)
              if fix_match:
                  in_code_block = False
                  code_block_lines = []
                  continue
              
              if line.startswith('```'):
                  if not in_code_block:
                      in_code_block = True
                      code_block_lines = [line]
                  else:
                      code_block_lines.append(line)
                      if current_comment:
                          current_comment['fix'] = '\n'.join(code_block_lines)
                      in_code_block = False
                      code_block_lines = []
                  continue
              
              if in_code_block:
                  code_block_lines.append(line)
          
          if current_comment:
              comments.append(current_comment)
          
          # Filter comments to only include files in PR and lines in diff
          valid_comments = []
          skipped_comments = []
          
          for c in comments:
              if c['filepath'] not in changed_files:
                  skipped_comments.append((c, "File not in PR"))
              elif c['filepath'] not in valid_lines:
                  skipped_comments.append((c, "No diff data for file"))
              elif int(c['line']) not in valid_lines[c['filepath']]:
                  skipped_comments.append((c, f"Line {c['line']} not in diff"))
              else:
                  valid_comments.append(c)
          
          if skipped_comments:
              print(f"\n⚠️ Skipping {len(skipped_comments)} comments not in PR diff:")
              for c, reason in skipped_comments[:5]:
                  print(f"  - {c['filepath']}:{c['line']} - {reason}")
              if len(skipped_comments) > 5:
                  print(f"  ... and {len(skipped_comments) - 5} more")
          
          print(f"Found {len(comments)} total comments")
          print(f"Valid comments (in changed files): {len(valid_comments)}")
          
          success_count = 0
          fail_count = 0
          
          for comment in valid_comments:
              body = f"**[{comment['severity']}]** {comment['comment']}"
              if comment['fix']:
                  body += f"\n\n### 💡 Suggested Fix:\n{comment['fix']}"
              
              print(f"\nAttempting to post comment:")
              print(f"  File: {comment['filepath']}")
              print(f"  Line: {comment['line']}")
              print(f"  Severity: {comment['severity']}")
              
              cmd = ['gh', 'api', '--method', 'POST', '-H', 'Accept: application/vnd.github+json',
                     f'/repos/{repo}/pulls/{pr_number}/comments', '-f', f'body={body}',
                     '-f', f'commit_id={commit_sha}', '-f', f'path={comment["filepath"]}',
                     '-F', f'line={comment["line"]}', '-f', 'side=RIGHT']
              
              try:
                  result = subprocess.run(cmd, check=True, capture_output=True, text=True)
                  success_count += 1
                  print(f"  ✓ Success")
              except subprocess.CalledProcessError as e:
                  fail_count += 1
                  print(f"  ✗ Failed")
                  print(f"  Error: {e.stderr if e.stderr else 'Unknown error'}")
          
          print(f"\n{'='*60}")
          print(f"Summary: {success_count} comments posted successfully, {fail_count} failed")
          print(f"Total comments found: {len(comments)}")
          print(f"Valid comments (in changed files): {len(valid_comments)}")
          PYTHON_SCRIPT
      
      - name: Create Labels if Not Exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Define all possible labels with colors
          declare -A LABEL_COLORS=(
            ["bob-validated"]="0e8a16"
            ["severity-critical"]="d73a4a"
            ["severity-high"]="ff6b6b"
            ["severity-medium"]="fbca04"
            ["severity-low"]="d4c5f9"
            ["fix-needed"]="ff9800"
            ["security-review"]="b60205"
            ["performance-review"]="1d76db"
          )
          
          # Create each label if it doesn't exist
          for label in "${!LABEL_COLORS[@]}"; do
            color="${LABEL_COLORS[$label]}"
            gh label create "$label" --color "$color" --force 2>/dev/null || true
          done
          
          echo "Labels created/verified"
      
      - name: Analyze Review and Apply Labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Initialize labels array
          LABELS="bob-validated"
          
          # Check for critical issues
          if grep -qi "critical" bob_review_output.md; then
            LABELS="$LABELS,severity-critical"
          fi
          
          # Check for high severity issues
          if grep -qi "high" bob_review_output.md && ! echo "$LABELS" | grep -q "severity-critical"; then
            LABELS="$LABELS,severity-high"
          fi
          
          # Check for medium severity issues
          if grep -qi "medium" bob_review_output.md && ! echo "$LABELS" | grep -q "severity-"; then
            LABELS="$LABELS,severity-medium"
          fi
          
          # Check if fixes are suggested
          if grep -qi "fix" bob_review_output.md || grep -qi "suggestion" bob_review_output.md; then
            LABELS="$LABELS,fix-needed"
          fi
          
          # Check for security issues
          if grep -qi "security" bob_review_output.md; then
            LABELS="$LABELS,security-review"
          fi
          
          # Check for performance issues
          if grep -qi "performance" bob_review_output.md; then
            LABELS="$LABELS,performance-review"
          fi
          
          # Apply labels to PR
          echo "Applying labels: $LABELS"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "$LABELS"

