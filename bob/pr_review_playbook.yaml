name: PR Review Playbook
version: 2.0

output_format:
  enforce_sections: true
  sections:
    - "Intent Summary"
    - "High-Level Change Analysis"
    - "Critical Issues (Blockers)"
    - "High Severity Issues"
    - "Medium Severity Issues"
    - "Low Severity Issues"
    - "Security Findings"
    - "Required Tests"
    - "Breaking Changes Audit"
    - "Performance Observations"
    - "Documentation Requirements"
    - "Affected Files Summary"
    - "Positive Engineering Practices"
    - "Confidence Level"
    - "Final Verdict"
    - "Fix Suggestions"
    - "Auto-Generated Patch (Optional)"

force_tone:
  concise: true
  technical: true
  no-fluff: true
  no-generic-advice: true
  always-use-specific-file-paths: true

rules:
  blockers:
    - "Security vulnerability"
    - "Function returns unresolved promises"
    - "Breaking API change without migration"
    - "Incorrect error handling returning success"
    - "Hardcoded secrets"
    - "Missing required input validation"
    - "Duplicate entity / data conflict unhandled"
  
  high_severity:
    - "Incorrect logic"
    - "Missing required awaits"
    - "Uncaught exceptions"
    - "Bad return shape"
  
  medium_severity:
    - "Wrong HTTP code"
    - "Missing edge case tests"
    - "Performance inefficiency"
  
  low_severity:
    - "Commented-out code"
    - "Mixed imports"
    - "Missing JSDoc"
    - "Minor formatting"

passes:
  intent:
    required: true
    description: "Identify what the PR is intended to achieve."

  diff_analysis:
    required: true

  security:
    required: true
    
  correctness:
    required: true

  api_stability:
    required: true

  tests:
    required: true
    include_required_tests: true

  documentation:
    required: true

decision_logic:
  if_any_blockers: "BLOCK"
  if_high_severity_more_than_two: "WARN"
  else: "APPROVE"

post_review_prompt: |
  After presenting the full structured review, ask:
  "Would you like me to generate code fixes, patches, and missing tests based on the blockers and severe issues? Reply 'yes'."
